<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="330" viewBox="0 0 1100 330" role="img" aria-labelledby="title desc">
  <title id="title">Connect Ubuntu to Wi-Fi</title>
  <desc id="desc">Five numbered steps show opening the system menu, choosing Wi-Fi, selecting a network, entering the password, and confirming connection.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect width="1100" height="330" rx="20" fill="#f8fafc"/>
  <text x="550" y="42" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#0f172a">Connect to Wi-Fi in Ubuntu</text>
  <g font-family="sans-serif" text-anchor="middle">
    <g transform="translate(25,80)"><rect width="180" height="190" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="3"/><circle cx="28" cy="28" r="20" fill="#7c3aed"/><text x="28" y="35" font-size="20" font-weight="700" fill="#fff">1</text><rect x="35" y="65" width="110" height="62" rx="8" fill="#1e293b"/><circle cx="125" cy="82" r="6" fill="#22c55e"/><text x="90" y="158" font-size="19" fill="#0f172a">Open system</text><text x="90" y="183" font-size="19" fill="#0f172a">menu</text></g>
    <g transform="translate(242,80)"><rect width="180" height="190" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="3"/><circle cx="28" cy="28" r="20" fill="#7c3aed"/><text x="28" y="35" font-size="20" font-weight="700" fill="#fff">2</text><path d="M55 113 Q90 70 125 113 M67 116 Q90 90 113 116 M84 121 Q90 114 96 121" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/><text x="90" y="158" font-size="19" fill="#0f172a">Select Wi-Fi</text><text x="90" y="183" font-size="19" fill="#0f172a">and Network</text></g>
    <g transform="translate(459,80)"><rect width="180" height="190" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="3"/><circle cx="28" cy="28" r="20" fill="#7c3aed"/><text x="28" y="35" font-size="20" font-weight="700" fill="#fff">3</text><rect x="40" y="68" width="100" height="23" rx="5" fill="#dbeafe"/><rect x="40" y="98" width="100" height="23" rx="5" fill="#2563eb"/><rect x="40" y="128" width="100" height="23" rx="5" fill="#dbeafe"/><text x="90" y="177" font-size="19" fill="#0f172a">Choose name</text></g>
    <g transform="translate(676,80)"><rect width="180" height="190" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="3"/><circle cx="28" cy="28" r="20" fill="#7c3aed"/><text x="28" y="35" font-size="20" font-weight="700" fill="#fff">4</text><rect x="30" y="78" width="120" height="43" rx="7" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="90" y="107" font-size="26" fill="#334155">••••••••</text><rect x="55" y="132" width="70" height="30" rx="6" fill="#2563eb"/><text x="90" y="153" font-size="15" fill="#fff">Connect</text><text x="90" y="183" font-size="19" fill="#0f172a">Password</text></g>
    <g transform="translate(893,80)"><rect width="180" height="190" rx="16" fill="#fff" stroke="#cbd5e1" stroke-width="3"/><circle cx="28" cy="28" r="20" fill="#7c3aed"/><text x="28" y="35" font-size="20" font-weight="700" fill="#fff">5</text><path d="M50 115 Q90 65 130 115 M65 120 Q90 90 115 120 M84 126 Q90 118 96 126" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/><circle cx="90" cy="137" r="7" fill="#16a34a"/><text x="90" y="177" font-size="19" fill="#0f172a">Connected</text></g>
  </g>
  <g stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"><line x1="210" y1="175" x2="232" y2="175"/><line x1="427" y1="175" x2="449" y2="175"/><line x1="644" y1="175" x2="666" y2="175"/><line x1="861" y1="175" x2="883" y2="175"/></g>
  <text x="550" y="310" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#475569">Never save the Wi-Fi password in Git, a notebook, or a screenshot.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" role="img" aria-labelledby="title desc">
  <title id="title">Cable connection guide</title>
  <desc id="desc">Keyboard and mouse connect by USB, monitor connects by display cable, power connects to an outlet, and Wi-Fi connects wirelessly.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1000" height="480" rx="20" fill="#f8fafc"/>
  <text x="500" y="42" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#0f172a">Connect these before switching on</text>

  <rect x="385" y="145" width="230" height="210" rx="18" fill="#172033" stroke="#334155" stroke-width="4"/>
  <circle cx="500" cy="310" r="8" fill="#22c55e"/>
  <text x="500" y="225" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#fff">Ubuntu</text>
  <text x="500" y="258" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#fff">machine</text>

  <rect x="35" y="115" width="220" height="78" rx="12" fill="#fff" stroke="#64748b" stroke-width="3"/>
  <g fill="#cbd5e1">
    <rect x="52" y="133" width="18" height="13"/><rect x="76" y="133" width="18" height="13"/><rect x="100" y="133" width="18" height="13"/><rect x="124" y="133" width="18" height="13"/><rect x="148" y="133" width="18" height="13"/><rect x="172" y="133" width="18" height="13"/><rect x="196" y="133" width="18" height="13"/>
    <rect x="68" y="153" width="125" height="15"/>
  </g>
  <text x="145" y="218" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#0f172a">Keyboard</text>
  <line x1="255" y1="154" x2="375" y2="190" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="315" y="145" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#1d4ed8">USB</text>

  <rect x="88" y="285" width="90" height="118" rx="42" fill="#fff" stroke="#64748b" stroke-width="3"/>
  <line x1="133" y1="287" x2="133" y2="330" stroke="#64748b" stroke-width="3"/>
  <text x="133" y="430" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#0f172a">Mouse</text>
  <line x1="178" y1="340" x2="375" y2="290" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="276" y="292" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#1d4ed8">USB</text>

  <rect x="745" y="95" width="215" height="145" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="5"/>
  <rect x="830" y="240" width="45" height="30" fill="#475569"/>
  <rect x="790" y="270" width="125" height="10" rx="5" fill="#475569"/>
  <text x="852" y="68" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#0f172a">Monitor</text>
  <line x1="625" y1="205" x2="735" y2="175" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="680" y="170" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1d4ed8">Display cable</text>

  <rect x="792" y="355" width="90" height="90" rx="12" fill="#fff" stroke="#64748b" stroke-width="3"/>
  <line x1="820" y1="380" x2="820" y2="405" stroke="#334155" stroke-width="7"/>
  <line x1="855" y1="380" x2="855" y2="405" stroke="#334155" stroke-width="7"/>
  <text x="837" y="470" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#0f172a">Power</text>
  <line x1="615" y1="320" x2="782" y2="390" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)"/>

  <path d="M445 120 Q500 65 555 120 M462 125 Q500 88 538 125 M483 132 Q500 116 517 132" fill="none" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
  <circle cx="500" cy="137" r="7" fill="#16a34a"/>
  <text x="500" y="78" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#15803d">Wi-Fi — no cable</text>
</svg>

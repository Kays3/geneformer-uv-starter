[project]
name = "geneformer-analysis"
version = "0.1.0"
description = "Reproducible Geneformer analysis environment"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
  "geneformer",
  "ipykernel",
  "jupyterlab",
  "torch",
]

[dependency-groups]
dev = ["pytest", "ruff"]

[tool.uv]
package = false

[tool.uv.sources]
geneformer = { path = "../Geneformer", editable = true }

[project]
name = "geneformer-analysis"
version = "0.1.0"
description = "Reproducible CPU-only Geneformer analysis environment"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
  "geneformer",
  "ipykernel",
  "ipywidgets>=8.1.8",
  "jupyterlab",
  "torch",
  "transformers>=4.46,<5",
]

[dependency-groups]
dev = ["pytest", "ruff"]

[tool.uv]
package = false

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
geneformer = { path = "../Geneformer", editable = true }
torch = [
  { index = "pytorch-cpu", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

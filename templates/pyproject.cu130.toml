[project]
name = "geneformer-analysis"
version = "0.1.0"
description = "Reproducible CUDA 13.0 Geneformer analysis environment"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
  "geneformer",
  "ipykernel",
  "jupyterlab",
  "torch",
]

[dependency-groups]
dev = ["pytest", "ruff"]

[tool.uv]
package = false

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
geneformer = { path = "../Geneformer", editable = true }
torch = [
  { index = "pytorch-cu130", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

# Repository-scoped tmux settings for the persistent JupyterLab session.
set-option -g mouse on
set-option -g history-limit 100000
set-option -g set-clipboard on
set-window-option -g mode-keys vi

# A completed mouse drag copies the selection into tmux's buffer and, when the
# terminal supports OSC 52, into the terminal client's system clipboard.
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Keyboard equivalents: Prefix+[ enters copy mode, v begins a selection,
# and y copies it. Prefix+] pastes the most recent tmux buffer.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run --locked ruff check .
      - run: uv run --locked pytest
      - run: bash -n scripts/bootstrap_workspace.sh
      - run: ./scripts/bootstrap_workspace.sh --help
